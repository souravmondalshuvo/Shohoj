name = "shohoj-papers"
main = "index.js"
compatibility_date = "2025-09-01"

# R2 bucket binding — create the bucket in the Cloudflare dashboard first.
[[r2_buckets]]
binding = "PAPERS_BUCKET"
bucket_name = "shohoj-papers"

# Plain-text env vars — safe to commit. Do NOT put secrets here; use
